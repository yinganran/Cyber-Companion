<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博女友</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-container">
<aside class="sidebar" id="sidebar">
<div class="sidebar-header">
<div class="logo"><span class="logo-icon">赛</span><span class="logo-text">赛博女友</span></div>
<button class="sidebar-toggle" id="sidebarToggle">✕</button>
</div>
<div class="sidebar-section">
<h3 class="section-title"><span class="section-icon">🤖</span> AI 头像</h3>
<div class="avatar-upload-area">
<div class="avatar-preview" id="aiAvatarPreview">
<img id="aiAvatarImg" src="/static/uploads/avatars/default_ai.png" alt="AI头像">
</div>
<div class="avatar-actions">
<label class="btn btn-sm btn-outline" style="position:relative;overflow:hidden"><input type="file" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp" id="aiAvatarInput" class="file-input-hidden">上传AI头像</label>
<button class="btn btn-sm btn-outline-danger" id="removeAiAvatar">✕</button>
</div>
</div>
</div>
<div class="sidebar-section">
<h3 class="section-title"><span class="section-icon">👤</span> 我的头像</h3>
<div class="avatar-upload-area">
<div class="avatar-preview" id="userAvatarPreview">
<img id="userAvatarImg" src="/static/uploads/avatars/default_user.png" alt="用户头像">
</div>
<div class="avatar-actions">
<label class="btn btn-sm btn-outline" style="position:relative;overflow:hidden"><input type="file" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp" id="userAvatarInput" class="file-input-hidden">上传我的头像</label>
<button class="btn btn-sm btn-outline-danger" id="removeUserAvatar">✕</button>
</div>
</div>
</div>
<div class="sidebar-section">
<h3 class="section-title"><span class="section-icon">💬</span> AI 名字</h3>
<div class="input-group">
<input type="text" id="aiNameInput" class="input" placeholder="输入名字" value="小赛">
<button class="btn btn-sm btn-primary" id="saveNameBtn">保存</button>
</div>
</div>
<div class="sidebar-section">
<h3 class="section-title"><span class="section-icon">🧠</span> 风格学习</h3>
<div class="learn-buttons">
<label class="btn btn-primary btn-block" style="position:relative;overflow:hidden"><input type="file" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp" id="screenshotInput" class="file-input-hidden"><span class="btn-icon">📷</span> 上传聊天截图</label>
<button class="btn btn-outline btn-block" id="pasteTextBtn"><span class="btn-icon">📋</span> 粘贴聊天文本</button>
</div>
<div class="learn-status" id="learnStatus"></div>
</div>
<div class="sidebar-section">
<h3 class="section-title"><span class="section-icon">📝</span> 风格档案</h3>
<div class="style-profile-box" id="styleProfileBox"><span class="text-muted">暂无风格数据...</span></div>
</div>
<div class="sidebar-footer">
<button class="btn btn-outline-danger btn-block" id="resetBtn"><span class="btn-icon">🔄</span> 重置全部</button>
</div>
</aside>
<main class="chat-main">
<header class="chat-header">
<button class="menu-btn" id="menuBtn">☰</button>
<div class="header-info">
<div class="header-avatar" id="headerAvatar"><img id="headerAvatarImg" src="/static/uploads/avatars/default_ai.png" alt="AI头像"></div>
<div class="header-text"><h2 id="headerName">小赛</h2><span class="online-status">在线</span></div>
</div>
<div class="header-actions"><button class="btn btn-sm btn-outline" id="clearChatBtn">清空聊天</button></div>
</header>
<div class="chat-messages" id="chatMessages">
<div class="welcome-message">
<div class="welcome-icon">💕</div>
<h3>赛博女友</h3>
<p>你的 AI 伴侣，由 Ollama 驱动</p>
<p class="welcome-hint">开始聊天，或上传聊天截图让她学习你的说话风格！</p>
</div>
</div>
<div class="typing-indicator" id="typingIndicator" style="display:none;">
<div class="typing-avatar"><img id="typingAvatarImg" src="/static/uploads/avatars/default_ai.png" alt="AI头像"></div>
<div class="typing-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
</div>
<div class="chat-input-area">
<div class="input-container">
<textarea id="messageInput" class="chat-input" placeholder="输入消息..." rows="1"></textarea>
<button class="send-btn" id="sendBtn" title="发送">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none">
<path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</button>
</div>
</div>
</main>
</div>
<div class="modal-overlay" id="pasteModal" style="display:none;">
<div class="modal">
<div class="modal-header"><h3>粘贴聊天文本</h3><button class="modal-close" id="closePasteModal">✕</button></div>
<div class="modal-body">
<p class="modal-hint">格式：昵称: 消息内容（每行一条）</p>
<textarea id="pasteTextArea" class="modal-textarea" placeholder="女朋友: 宝贝在干嘛~&#10;我: 在想你呀！&#10;女朋友: 今天想吃什么？"></textarea>
</div>
<div class="modal-footer">
<button class="btn btn-outline" id="cancelPasteBtn">取消</button>
<button class="btn btn-primary" id="confirmPasteBtn">学习风格</button>
</div>
</div>
</div>
<div class="modal-overlay" id="learnResultModal" style="display:none;">
<div class="modal modal-lg">
<div class="modal-header"><h3>学习结果</h3><button class="modal-close" id="closeLearnModal">✕</button></div>
<div class="modal-body">
<div class="result-section"><h4>📷 OCR 识别文本：</h4><pre id="learnOcrText"></pre></div>
<div class="result-section"><h4>📝 风格分析：</h4><pre id="learnStyleAnalysis"></pre></div>
</div>
<div class="modal-footer"><button class="btn btn-primary" id="closeLearnBtn">确定</button></div>
</div>
</div>
<script src="/static/js/main.js"></script>
</body>
</html>
